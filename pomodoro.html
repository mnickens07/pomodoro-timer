<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <style>
    :root {
      --work-bg: #a32626;
      --break-bg: #1f7a3f;
      --text-light: #fff;
      --card-bg: rgba(255,255,255,0.1);
      --border: rgba(255,255,255,0.25);
      --shadow: 0 20px 50px rgba(0,0,0,0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text-light);
      background: radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 22%),
                  linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.45));
      transition: background 0.5s ease;
    }

    body.work {
      background-color: var(--work-bg);
    }

    body.break {
      background-color: var(--break-bg);
    }

    body.flash {
      animation: flash-bg 0.5s ease;
    }

    @keyframes flash-bg {
      0% { filter: brightness(1.5); }
      100% { filter: brightness(1); }
    }

    .container {
      width: min(760px, calc(100vw - 32px));
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .panel {
      padding: 36px 32px 24px;
      text-align: center;
    }

    .mode-label {
      text-transform: uppercase;
      letter-spacing: 0.32em;
      font-size: 0.9rem;
      opacity: 0.85;
      margin-bottom: 12px;
    }

    .timer-display {
      font-size: clamp(4rem, 8vw, 8rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      margin: 4px 0 18px;
    }

    .status-text {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      color: var(--text-light);
      background: rgba(255,255,255,0.14);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      font-weight: 600;
      min-width: 110px;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.22);
    }

    .task-board {
      border-top: 1px solid rgba(255,255,255,0.14);
      padding: 28px 32px 32px;
      background: rgba(0,0,0,0.08);
    }

    .task-board h2 {
      font-size: 1.25rem;
      margin-bottom: 18px;
    }

    .task-form {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .task-form input {
      flex: 1 1 220px;
      min-width: 180px;
      padding: 14px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: var(--text-light);
      outline: none;
      font-size: 1rem;
    }

    .task-form input::placeholder {
      color: rgba(255,255,255,0.72);
    }

    .task-list {
      display: grid;
      gap: 12px;
    }

    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .task-item.active {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.28);
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      opacity: 0.7;
    }

    .task-text {
      flex: 1;
      text-align: left;
      font-size: 1rem;
      word-break: break-word;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .task-actions button {
      min-width: 38px;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.95rem;
    }

    .indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      opacity: 0.9;
      justify-content: center;
    }

    .indicator span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      background: currentColor;
    }

    .work .indicator {
      color: #ffd6d6;
    }

    .break .indicator {
      color: #c2ffd0;
    }

    @media (max-width: 520px) {
      .timer-display {
        font-size: 5rem;
      }
      .task-form {
        flex-direction: column;
        align-items: stretch;
      }
      .controls {
        flex-direction: column;
      }
    }
  </style>
</head>
<body class="work">
  <div class="container">
    <section class="panel">
      <div class="mode-label" id="modeLabel">Work Session</div>
      <div class="timer-display" id="countdown">25:00</div>
      <div class="status-text" id="statusText">Focus on your active task.</div>
      <div class="controls">
        <button id="startPauseBtn">Start</button>
        <button id="resetBtn">Reset</button>
      </div>
      <div class="indicator"><span></span><div id="cycleText">Work time</div></div>
    </section>

    <section class="task-board">
      <h2>Task List</h2>
      <form class="task-form" id="taskForm">
        <input type="text" id="taskInput" placeholder="Add a new task" autocomplete="off" />
        <button type="submit">Add Task</button>
      </form>
      <div class="task-list" id="taskList"></div>
    </section>
  </div>

  <script>
    const workDuration = 25 * 60;
    const breakDuration = 5 * 60;
    let remainingSeconds = workDuration;
    let mode = 'work';
    let timerInterval = null;
    let tasks = JSON.parse(localStorage.getItem('pomodoroTasks') || '[]');
    let activeTaskId = localStorage.getItem('pomodoroActiveTask') || null;
    let isRunning = false;

    const countdownEl = document.getElementById('countdown');
    const modeLabelEl = document.getElementById('modeLabel');
    const statusTextEl = document.getElementById('statusText');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const taskForm = document.getElementById('taskForm');
    const taskInput = document.getElementById('taskInput');
    const taskListEl = document.getElementById('taskList');
    const cycleTextEl = document.getElementById('cycleText');

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${String(minutes).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }

    function updateTimerDisplay() {
      countdownEl.textContent = formatTime(remainingSeconds);
      document.body.className = mode;
      modeLabelEl.textContent = mode === 'work' ? 'Work Session' : 'Break Time';
      cycleTextEl.textContent = mode === 'work' ? 'Work time' : 'Break time';
      statusTextEl.textContent = isRunning
        ? (mode === 'work' ? 'Keep going, stay focused.' : 'Take a relaxing break.')
        : 'Press Start to begin.';
    }

    function saveTasks() {
      localStorage.setItem('pomodoroTasks', JSON.stringify(tasks));
      localStorage.setItem('pomodoroActiveTask', activeTaskId);
    }

    function playNotification() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = 520;
        gain.gain.value = 0.14;
        oscillator.connect(gain);
        gain.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.35);
      } catch (error) {
        console.warn('Audio not supported', error);
      }

      document.body.classList.add('flash');
      window.setTimeout(() => document.body.classList.remove('flash'), 450);
    }

    function switchMode() {
      mode = mode === 'work' ? 'break' : 'work';
      remainingSeconds = mode === 'work' ? workDuration : breakDuration;
      isRunning = false;
      clearInterval(timerInterval);
      timerInterval = null;
      startPauseBtn.textContent = 'Start';
      updateTimerDisplay();
    }

    function timerTick() {
      if (remainingSeconds <= 0) {
        playNotification();
        switchMode();
        return;
      }
      remainingSeconds -= 1;
      updateTimerDisplay();
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      startPauseBtn.textContent = 'Pause';
      timerInterval = setInterval(timerTick, 1000);
      updateTimerDisplay();
    }

    function pauseTimer() {
      isRunning = false;
      startPauseBtn.textContent = 'Start';
      clearInterval(timerInterval);
      timerInterval = null;
      updateTimerDisplay();
    }

    function resetTimer() {
      pauseTimer();
      remainingSeconds = mode === 'work' ? workDuration : breakDuration;
      updateTimerDisplay();
    }

    function renderTasks() {
      taskListEl.innerHTML = '';
      if (!tasks.length) {
        taskListEl.innerHTML = '<div style="opacity:.75; text-align:center; padding:18px 0;">No tasks yet. Add one to stay on track.</div>';
        return;
      }

      tasks.forEach(task => {
        const taskEl = document.createElement('div');
        taskEl.className = 'task-item' + (task.id === activeTaskId ? ' active' : '') + (task.done ? ' done' : '');
        const text = document.createElement('div');
        text.className = 'task-text';
        text.textContent = task.text;

        const actions = document.createElement('div');
        actions.className = 'task-actions';

        const doneBtn = document.createElement('button');
        doneBtn.textContent = task.done ? 'Undo' : 'Done';
        doneBtn.title = task.done ? 'Mark as not done' : 'Mark task done';
        doneBtn.addEventListener('click', () => {
          task.done = !task.done;
          if (task.done && task.id === activeTaskId) activeTaskId = null;
          saveTasks();
          renderTasks();
        });

        const activeBtn = document.createElement('button');
        activeBtn.textContent = task.id === activeTaskId ? 'Active' : 'Choose';
        activeBtn.title = 'Set as active task';
        activeBtn.addEventListener('click', () => {
          activeTaskId = task.id;
          saveTasks();
          renderTasks();
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.title = 'Remove task';
        deleteBtn.addEventListener('click', () => {
          tasks = tasks.filter(item => item.id !== task.id);
          if (activeTaskId === task.id) activeTaskId = null;
          saveTasks();
          renderTasks();
        });

        actions.append(doneBtn, activeBtn, deleteBtn);
        taskEl.append(text, actions);
        taskListEl.appendChild(taskEl);
      });
    }

    taskForm.addEventListener('submit', event => {
      event.preventDefault();
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.push({ id: `task-${Date.now()}`, text, done: false });
      taskInput.value = '';
      saveTasks();
      renderTasks();
    });

    startPauseBtn.addEventListener('click', () => {
      if (isRunning) pauseTimer(); else startTimer();
    });

    resetBtn.addEventListener('click', resetTimer);

    updateTimerDisplay();
    renderTasks();
  </script>
</body>
</html>
